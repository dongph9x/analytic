version: "3.9"

services:
  analytic-chart:
    build: .
    container_name: analytic_chart_app
    ports:
      - "3004:3004"
    env_file:
      - .env
    environment:
      - PORT=3004
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
    networks:
      - app

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_analytic
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-false}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-}
      # Truy cập từ trình duyệt tại http://localhost:5678
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  n8n_data:

