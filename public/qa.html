<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Hỏi đáp | Phân tích Việt Nam</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: radial-gradient(circle at top left, #0f172a, #020617 45%, #000 100%);
        color: #e5e7eb;
        min-height: 100vh;
        padding: 24px;
      }
      .app-shell {
        max-width: 1100px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        background: rgba(15, 23, 42, 0.96);
        border-radius: 24px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.8), 0 0 0 1px rgba(148, 163, 184, 0.08);
        overflow: hidden;
      }
      .nav {
        flex-shrink: 0;
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        padding: 12px 24px;
        border-bottom: 1px solid rgba(51, 65, 85, 0.9);
        background: rgba(15, 23, 42, 0.6);
      }
      .nav a {
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 13px;
        color: #94a3b8;
        text-decoration: none;
        transition: color 0.15s, background 0.15s;
      }
      .nav a:hover { color: #e2e8f0; background: rgba(51, 65, 85, 0.6); }
      .nav a.active { color: #f9fafb; background: rgba(59, 130, 246, 0.25); font-weight: 500; }
      .main { flex: 1 1 auto; min-height: 0; padding: 24px 28px 32px; }
      .page-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
      .page-caption { font-size: 12px; color: #9ca3af; margin-bottom: 18px; }

      .card {
        border: 1px solid rgba(55, 65, 81, 0.9);
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.6);
        padding: 16px 18px;
      }
      .card h2 { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #e5e7eb; }
      label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 6px; }
      textarea {
        width: 100%;
        min-height: 120px;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(51, 65, 85, 0.9);
        background: rgba(2, 6, 23, 0.8);
        color: #e5e7eb;
        font-family: inherit;
        font-size: 14px;
        resize: vertical;
        outline: none;
      }
      textarea:focus { border-color: rgba(96, 165, 250, 0.9); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
      .actions { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
      .btn {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 9px 14px; border-radius: 999px;
        border: 1px solid rgba(55, 65, 81, 0.9);
        background: rgba(30, 41, 59, 0.9);
        color: #e2e8f0; font-size: 13px;
        cursor: pointer;
      }
      .btn:hover { border-color: rgba(148, 163, 184, 0.7); background: rgba(51, 65, 85, 0.8); }
      .btn:disabled { opacity: 0.6; cursor: not-allowed; }
      .error { color: #f87171; font-size: 12px; }
      .muted { color: #94a3b8; }

      .qa-answer {
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.6;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <nav class="nav">
        <a href="/">Trang chủ</a>
        <a href="/news">Tin tức</a>
        <a href="/outlook">Nhận định</a>
        <a href="/summary">Tổng hợp</a>
        <a href="/calendar">Lịch</a>
        <a href="/planning-check">Kiểm tra quy hoạch</a>
        <a href="/fengshui">Phong thủy</a>
        <a href="/qa" class="active">Hỏi đáp</a>
        <a href="/exchange">Tỷ giá</a>
      </nav>
      <main class="main">
        <h1 class="page-title">Hỏi đáp</h1>
        <p class="page-caption">Nhập câu hỏi bên dưới, hệ thống sẽ gửi lên ChatGPT và hiển thị câu trả lời.</p>

        <section class="card">
          <h2>Câu hỏi</h2>
          <label for="qa-question">Nội dung câu hỏi</label>
          <textarea id="qa-question" placeholder="Ví dụ: Cách đầu tư bất động sản an toàn? Hoặc bất kỳ câu hỏi nào bạn muốn."></textarea>
          <div class="actions">
            <button type="button" class="btn" id="qa-submit" onclick="if(window.qaSubmit) window.qaSubmit();">Gửi câu hỏi (ChatGPT)</button>
            <div class="error" id="qa-error" aria-live="polite"></div>
          </div>
        </section>

        <section class="card" style="margin-top: 14px;">
          <h2>Kết quả</h2>
          <div id="qa-result">
            <div class="muted">Câu trả lời sẽ hiển thị ở đây sau khi bạn gửi câu hỏi.</div>
          </div>
        </section>
      </main>
    </div>

    <script src="/api-auth.js"></script>
    <script>
(function () {
  var questionEl = document.getElementById('qa-question');
  var resultEl = document.getElementById('qa-result');
  var errorEl = document.getElementById('qa-error');
  var btnEl = document.getElementById('qa-submit');

  function setLoading(loading) {
    if (!btnEl || !resultEl) return;
    if (loading) {
      resultEl.innerHTML = '<div class="muted">Đang gửi câu hỏi và chờ ChatGPT trả lời…</div>';
      btnEl.disabled = true;
    } else {
      btnEl.disabled = false;
    }
  }

  function showError(msg) {
    if (errorEl) errorEl.textContent = msg || '';
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str != null ? String(str) : '';
    return div.innerHTML;
  }

  function submit() {
    var q = questionEl ? (questionEl.value || '').trim() : '';
    showError('');
    if (!q) {
      showError('Vui lòng nhập nội dung câu hỏi.');
      return;
    }
    setLoading(true);
    var fetchFn = window.apiFetch || fetch;
    fetchFn('/api/qa', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ question: q })
    })
      .then(function (res) { return res.text().then(function (text) { var body = null; try { body = text ? JSON.parse(text) : null; } catch (_) {} return { status: res.status, body: body }; }); })
      .then(function (result) {
        setLoading(false);
        if (result.status !== 200) {
          showError(result.body && result.body.error ? result.body.error : 'Lỗi kết nối.');
          resultEl.innerHTML = '<div class="muted">Câu trả lời sẽ hiển thị ở đây sau khi bạn gửi câu hỏi.</div>';
          return;
        }
        if (result.body && result.body.ok && result.body.answer != null) {
          resultEl.innerHTML = '<div class="qa-answer">' + escapeHtml(result.body.answer) + '</div>';
        } else {
          showError((result.body && result.body.error) || 'Không nhận được câu trả lời.');
          resultEl.innerHTML = '<div class="muted">Câu trả lời sẽ hiển thị ở đây sau khi bạn gửi câu hỏi.</div>';
        }
      })
      .catch(function (err) {
        setLoading(false);
        showError('Lỗi kết nối: ' + (err && err.message ? err.message : 'Không xác định'));
        resultEl.innerHTML = '<div class="muted">Câu trả lời sẽ hiển thị ở đây sau khi bạn gửi câu hỏi.</div>';
      });
  }

  window.qaSubmit = submit;
  if (questionEl) questionEl.addEventListener('keydown', function (e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); } });
})();
    </script>
  </body>
</html>
