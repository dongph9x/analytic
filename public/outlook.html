<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Nhận định xu hướng vàng, xăng, dầu | Phân tích Việt Nam</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: radial-gradient(circle at top left, #0f172a, #020617 45%, #000 100%);
        color: #e5e7eb;
        min-height: 100vh;
        padding: 24px;
      }
      .app-shell {
        max-width: 900px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        background: rgba(15, 23, 42, 0.96);
        border-radius: 24px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.8), 0 0 0 1px rgba(148, 163, 184, 0.08);
        overflow: hidden;
      }
      .nav {
        flex-shrink: 0;
        display: flex;
        gap: 4px;
        padding: 12px 24px;
        border-bottom: 1px solid rgba(51, 65, 85, 0.9);
        background: rgba(15, 23, 42, 0.6);
      }
      .nav a {
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 13px;
        color: #94a3b8;
        text-decoration: none;
        transition: color 0.15s, background 0.15s;
      }
      .nav a:hover { color: #e2e8f0; background: rgba(51, 65, 85, 0.6); }
      .nav a.active { color: #f9fafb; background: rgba(59, 130, 246, 0.25); font-weight: 500; }
      .main { flex: 1 1 auto; min-height: 0; padding: 24px 28px 32px; }
      .page-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
      .page-caption { font-size: 12px; color: #9ca3af; margin-bottom: 20px; }
      .content-loading, .content-error {
        padding: 32px;
        text-align: center;
        color: #94a3b8;
        font-size: 14px;
      }
      .content-error { color: #f87171; }
      .block {
        background: radial-gradient(circle at top left, rgba(30, 64, 175, 0.25), rgba(15, 23, 42, 0.96));
        border: 1px solid rgba(55, 65, 81, 0.9);
        border-radius: 16px;
        padding: 18px 20px;
        margin-bottom: 16px;
      }
      .block:last-child { margin-bottom: 0; }
      .block h2 {
        font-size: 15px; font-weight: 600; color: #e5e7eb;
        margin-bottom: 14px;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(51, 65, 85, 0.8);
      }
      .block h3 {
        font-size: 12px; font-weight: 600; color: #94a3b8;
        text-transform: uppercase; letter-spacing: 0.06em;
        margin: 12px 0 6px;
      }
      .block h3:first-of-type { margin-top: 0; }
      .block p {
        font-size: 13px; color: #cbd5e1; line-height: 1.6;
        margin-bottom: 8px;
      }
      .stream-raw { white-space: pre-wrap; word-break: break-word; font-size: 13px; line-height: 1.6; color: #cbd5e1; min-height: 80px; }
      .stream-content h2 { font-size: 15px; color: #e5e7eb; margin: 16px 0 8px; padding-bottom: 6px; border-bottom: 1px solid rgba(51, 65, 85, 0.8); }
      .stream-content h2:first-child { margin-top: 0; }
      .stream-content h3 { font-size: 13px; color: #94a3b8; margin: 12px 0 6px; }
      .stream-content p { margin: 8px 0; color: #cbd5e1; }
      .stream-content a { color: #38bdf8; text-decoration: underline; }
      .stream-content a:hover { color: #7dd3fc; }
      .footer-meta { margin-top: 20px; font-size: 11px; color: #6b7280; }
      .btn-refresh {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 6px 12px; border-radius: 999px;
        border: 1px solid rgba(55, 65, 81, 0.9);
        background: rgba(15, 23, 42, 0.9);
        color: #94a3b8; font-size: 12px;
        cursor: pointer; margin-top: 12px;
      }
      .btn-refresh:hover { color: #e2e8f0; border-color: rgba(148, 163, 184, 0.6); background: rgba(30, 41, 59, 0.9); }
      .btn-refresh:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <nav class="nav">
        <a href="index.html">Trang chủ</a>
        <a href="news.html">Tin tức</a>
        <a href="outlook.html" class="active">Nhận định</a>
        <a href="calendar.html">Lịch</a>
        <a href="planning-check.html">Kiểm tra quy hoạch</a>
        <a href="fengshui.html">Phong thủy</a>
      </nav>
      <main class="main">
        <h1 class="page-title">Nhận định xu hướng giá vàng, xăng, dầu</h1>
        <p class="page-caption">Đánh giá ngắn hạn (1-3 tháng) và dài hạn (6-12 tháng) từ ChatGPT</p>
        <div id="content-root">
          <div class="content-loading">Đang tải...</div>
        </div>
        <div class="footer-meta">
          <button type="button" class="btn-refresh" id="btn-refresh">Làm mới</button>
        </div>
      </main>
    </div>
    <script src="api-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const root = document.getElementById('content-root');
      const btn = document.getElementById('btn-refresh');

      function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function renderFromJson(data) {
        const shortTerm = data.shortTerm || {};
        const longTerm = data.longTerm || {};
        root.innerHTML = `
          <div class="block">
            <h2>Ngắn hạn (1–3 tháng)</h2>
            <h3>Vàng</h3>
            <p>${escapeHtml(shortTerm.gold || 'Chưa có nhận định.')}</p>
            <h3>Xăng, dầu</h3>
            <p>${escapeHtml(shortTerm.oil || 'Chưa có nhận định.')}</p>
          </div>
          <div class="block">
            <h2>Dài hạn (6–12 tháng)</h2>
            <h3>Vàng</h3>
            <p>${escapeHtml(longTerm.gold || 'Chưa có nhận định.')}</p>
            <h3>Xăng, dầu</h3>
            <p>${escapeHtml(longTerm.oil || 'Chưa có nhận định.')}</p>
          </div>
        `;
      }

      async function load(forceRefresh = false) {
        root.innerHTML = '<div class="content-loading">Đang tải...</div>';
        if (btn) btn.disabled = true;
        try {
          const url = forceRefresh ? '/api/outlook?refresh=1' : '/api/outlook';
          const res = await window.apiFetch(url);
          const ct = (res.headers.get('content-type') || '').toLowerCase();
          if (ct.includes('application/json')) {
            const json = await res.json();
            if (!json.ok) {
              root.innerHTML = '<div class="content-error">' + escapeHtml(json.error || 'Lỗi tải nhận định') + '</div>';
              return;
            }
            if (json.content) renderFromJson(json.content);
            else root.innerHTML = '<div class="content-loading">Chưa có nội dung.</div>';
            return;
          }
          root.innerHTML = '<pre class="stream-raw" id="stream-raw"></pre>';
          const rawEl = document.getElementById('stream-raw');
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let text = '';
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            text += decoder.decode(value, { stream: true });
            if (rawEl) rawEl.textContent = text;
          }
          text = text.trim();
          if (text.startsWith('{')) {
            try {
              const j = JSON.parse(text);
              if (j.error) {
                root.innerHTML = '<div class="content-error">' + escapeHtml(j.error) + '</div>';
                return;
              }
            } catch (_) {}
          }
          if (typeof marked !== 'undefined' && text) {
            root.innerHTML = '<div class="stream-content">' + marked.parse(text) + '</div>';
          } else if (text) {
            root.innerHTML = '<pre class="stream-raw">' + escapeHtml(text) + '</pre>';
          } else {
            root.innerHTML = '<div class="content-error">Không có nội dung. Kiểm tra OPENAI_API_KEY.</div>';
          }
        } catch (e) {
          root.innerHTML = '<div class="content-error">Không thể kết nối server.</div>';
        } finally {
          if (btn) btn.disabled = false;
        }
      }

      if (btn) btn.addEventListener('click', () => load(true));
      load(false);
    </script>
  </body>
</html>
